<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bloodstained Archive</title>
    <style>
        :root {
            --paper: #c5a880; 
            --paper-dark: #a68b66;
            --blood: #7b0000;
            --blood-dark: #4a0000;
            --ink: #2b1d0e;
        }

        body {
            background-color: #080808;
            background-image: radial-gradient(circle, #1a1010 0%, #000 100%);
            margin: 0;
            padding: 60px 20px;
            font-family: 'Georgia', 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .parchment-scroll {
            width: 100%;
            max-width: 850px;
            background-color: var(--paper);
            background-image: 
                url('https://www.transparenttextures.com/patterns/paper-fibers.png'),
                radial-gradient(circle at 10% 20%, rgba(123, 0, 0, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(74, 0, 0, 0.3) 0%, transparent 50%),
                linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.05) 100%);
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 100px rgba(0,0,0,0.2);
            border: 2px solid var(--paper-dark);
            position: relative;
            color: var(--ink);
            overflow: hidden;
            margin-bottom: 50px;
        }

        .blood-drip {
            position: absolute;
            top: 0; left: 15%;
            width: 2px; height: 150px;
            background: linear-gradient(to bottom, var(--blood), transparent);
            opacity: 0.6;
        }

        .archive-header {
            padding: 60px 60px 40px 60px;
            text-align: center;
            border-bottom: 2px solid rgba(123, 0, 0, 0.2);
        }

        .archive-header h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 5px;
            color: var(--blood-dark);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .intro-content {
            margin-top: 30px;
            font-size: 1.1rem;
            line-height: 1.8;
            font-style: italic;
        }

        details { border-bottom: 1px solid rgba(0,0,0,0.1); transition: all 0.3s; }
        summary {
            padding: 30px 60px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            outline: none;
        }
        summary:hover { background: rgba(123, 0, 0, 0.05); color: var(--blood); }
        details[open] summary { background: rgba(123, 0, 0, 0.1); color: var(--blood-dark); }
        summary::after { content: '†'; font-size: 1.5rem; }

        .section-content { padding: 0 60px 40px 60px; animation: fadeIn 0.6s ease; }
        .nested-box { margin-top: 15px; border: 1px solid rgba(123, 0, 0, 0.2); background: rgba(0, 0, 0, 0.03); }
        .nested-box summary { padding: 15px 25px; font-size: 1rem; }

        .visual-frame { margin: 20px 0; text-align: center; }
        .visual-frame img {
            max-width: 100%;
            border: 1px solid rgba(0,0,0,0.2);
            filter: sepia(0.3) contrast(1.1);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="parchment-scroll">
    <div class="blood-drip"></div>
    
    <header class="archive-header">
        <h1>THE FORBIDDEN LOG</h1>
        <div class="intro-content">
            <div class="visual-frame">
                <!-- 시스템 알림 레이아웃 적용 -->
                <img src="https://[YOUR_WORKER_URL].workers.dev?layout=alert&title=접속+성공&content=금지된+구역에+들어오셨습니다.\n모든+기록은+피로+새겨집니다.&color=7b0000" alt="system_alert">
            </div>
            <p>
                이곳은 기록되지 말았어야 할 복수의 흔적들입니다.<br>
                피로 쓰인 문장들은 지워지지 않으며, 오직 결말만을 향해 달려갑니다.
            </p>
        </div>
    </header>

    <details>
        <summary>SECTION I. THE GENESIS</summary>
        <div class="section-content">
            <p>태초에 어둠이 있었고, 그 어둠 속에서 첫 번째 비명이 울려 퍼졌습니다.</p>
        </div>
    </details>

    <details open>
        <summary>SECTION II. THE CONDEMNED</summary>
        <div class="section-content">
            
            <details class="nested-box">
                <summary>SUBJECT 001: THE FALLEN</summary>
                <div class="section-content">
                    <div class="visual-frame">
                        <!-- 프로필 레이아웃 적용 -->
                        <img src="https://[YOUR_WORKER_URL].workers.dev?layout=profile&title=타락한+기사&sub=심연의+감시자&content=성배를+지키던+자였으나,+지금은+피의+갈증에+굴복했습니다.&color=4a0000" alt="profile_knight">
                    </div>
                </div>
            </details>

            <details class="nested-box">
                <summary>SUBJECT 002: THE WITCH</summary>
                <div class="section-content">
                    <div class="visual-frame">
                        <img src="https://[YOUR_WORKER_URL].workers.dev?layout=profile&title=피의+마녀&sub=금지된+술사&content=타인의+생명을+매개체로+시간을+되돌리는+금기를+범했습니다.&color=7b0000" alt="profile_witch">
                    </div>
                </div>
            </details>

        </div>
    </details>

    <details>
        <summary>SECTION III. FINAL RITES</summary>
        <div class="section-content">
            <div class="visual-frame">
                <!-- 능력치/통계 레이아웃 적용 -->
                <img src="https://[YOUR_WORKER_URL].workers.dev?layout=stats&title=아카이브+오염도&content=잔혹도:+95%,해독률:+12%,위험도:+Critical&color=2b1d0e" alt="archive_stats">
            </div>
            <p>모든 기록이 완료되었습니다. 이제 당신의 차례입니다.</p>
        </div>
    </details>
</div>

</body>
</html>
