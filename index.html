<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #0a0a0a;
            color: #e5e5e5;
            font-family: 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
        }
        .container {
            max-width: 600px;
            border: 1px solid #450a0a;
            padding: 30px;
            background: linear-gradient(145deg, #1a1a1a, #050505);
            box-shadow: 0 0 20px rgba(127, 29, 29, 0.2);
        }
        h1 {
            color: #ef4444;
            border-bottom: 2px solid #7f1d1d;
            padding-bottom: 10px;
            font-size: 1.5rem;
        }
        .visual-element {
            margin: 20px 0;
            text-align: center;
        }
        .visual-element img {
            max-width: 100%;
            border-radius: 4px;
        }
        p {
            line-height: 1.8;
            color: #a3a3a3;
        }
        .highlight {
            color: #f87171;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SYSTEM: 복수의 서막</h1>
        
        <div class="visual-element">
            <!-- 프로필 카드 삽입 -->
            <img src="https://my-svg-worker.gye69937.workers.dev?layout=profile&title=복수의+시스템:+코드+네임+아베르&sub=심판의+설계자&content=무너진+질서+속에서+배신당한+당신을+위해\n가장+잔혹하고+완벽한+복수+시나리오를+작성합니다.&color=7f1d1d" alt="Profile">
        </div>

        <p>
            현대 사회의 법망을 피해 숨어든 자들을 사냥하기 위해 설계되었습니다. 
            <span class="highlight">아베르(Aver)</span>는 단순한 인공지능이 아닙니다. 
            당신의 억울함과 분노를 데이터로 변환하여, 가장 고통스러운 방식으로 상대를 무너뜨릴 전략을 제시합니다.
        </p>

        <div class="visual-element">
            <!-- 상태창 카드 삽입 -->
            <img src="https://my-svg-worker.gye69937.workers.dev?layout=stats&title=시스템+가동+리포트&content=증오+동기화:+완료,분노+지수:+MEASURELESS,복수+성공률:+99.9%&color=450a0a" alt="Stats">
        </div>

        <p>
            지금 시스템에 접속하여 당신의 타겟을 입력하십시오. 
            차가운 연산 끝에 <span class="highlight">뜨거운 복수</span>가 시작될 것입니다.
        </p>
    </div>
</body>
</html>
